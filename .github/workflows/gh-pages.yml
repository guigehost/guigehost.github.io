name: Deploy Hugo to Tencent Cloud via SFTP

on:
  push:
    branches: [ main ]  # 触发自动部署的分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 如果Hugo主题通过子模块引入，必须启用此选项

      # 步骤2：安装指定版本的Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.144.1"  # 替换为你实际使用的Hugo版本
          extended: true  # 使用Hugo扩展版（支持Sass等）

      # 步骤3：构建静态网站
      - name: Build Site
        run: hugo --minify  # 生成优化后的静态文件到/public目录

      # 步骤4：安装SFTP依赖工具lftp
      - name: Install lftp
        run: sudo apt-get install -y lftp  # 安装SFTP客户端工具

      # 步骤5：通过SFTP上传到服务器
      - name: Upload Files via SFTP
        env:
          FTP_USER: ${{ secrets.WINSCP_USER }}    # 从GitHub Secrets读取用户名
          FTP_PASS: ${{ secrets.WINSCP_PASS }}    # 从GitHub Secrets读取密码
          FTP_HOST: ${{ secrets.WINSCP_HOST }}    # SFTP服务器地址（如IP）
          FTP_PORT: ${{ secrets.WINSCP_PORT }}    # SFTP端口（默认22）
          FTP_PATH: "C:\\www\\wwwroot\\guige.host\\"     # 服务器目标目录
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" -p $FTP_PORT sftp://$FTP_HOST <<EOF
          mirror -R --delete --verbose ./public $FTP_PATH
          quit
          EOF