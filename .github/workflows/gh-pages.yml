name: Deploy Hugo to Tencent Cloud via FTP  # 🔧 修改协议名称

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 步骤2：安装Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.144.1"
          extended: true

      # 步骤3：构建静态网站
      - name: Build Site
        run: hugo --minify

      # 步骤4：安装lftp工具
      - name: Install lftp
        run: sudo apt-get install -y lftp

      # 步骤5：通过FTP上传到服务器（关键修改） 🔧
      - name: Upload Files via FTP  # 步骤名称修改
        env:
          FTP_USER: ${{ secrets.WINSCP_USER }}
          FTP_PASS: ${{ secrets.WINSCP_PASS }}
          FTP_HOST: ${{ secrets.WINSCP_HOST }}
          FTP_PORT: 21  # 🔧 FTP默认端口改为21
          FTP_PATH: "c:/www/wwwroot/guige.host/"  # 🔧 路径改为Linux风格
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" -p $FTP_PORT ftp://$FTP_HOST <<EOF
          set ftp:passive-mode true  # 🔧 启用被动模式解决防火墙问题
          set ftp:charset utf8  # 🔧 确保中文文件名兼容
          mirror -R --delete --verbose ./public "$FTP_PATH"
          quit
          EOF