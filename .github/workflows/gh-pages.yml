name: Deploy Hugo to Windows(宝塔) via FTP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.144.1"
          extended: true

      - name: Build Site
        run: hugo --minify

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Upload Files via FTP
        env:
          FTP_USER: ${{ secrets.WINSCP_USER }}
          FTP_PASS: ${{ secrets.WINSCP_PASS }}
          FTP_HOST: ${{ secrets.WINSCP_HOST }}
          FTP_PORT: 21
          FTP_PATH: "guige.host/"  # 关键修改点1
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" -p $FTP_PORT ftp://$FTP_HOST <<EOF
          set ftp:passive-mode true
          set ftp:charset utf8
          set file:charset UTF-8  # 关键修改点2
          mirror -R --delete --verbose --parallel=4 ./public "/$FTP_PATH"  # 关键修改点3
          quit
          EOF