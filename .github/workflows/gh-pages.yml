name: Deploy Hugo to GitHub Pages

   on:
     push:
       branches: [ "main" ]  # ✨ 确保分支名与实际使用的分支一致

   jobs:
     build:
       runs-on: ubuntu-latest
       steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
             submodules: recursive  # ✅ 关键！解决主题无法拉取问题

         - name: Setup Hugo
           uses: peaceiris/actions-hugo@v2
           with:
             hugo-version: 'latest'
             extended: true  # 🚨 必须与本地安装的Hugo类型一致

         - name: Build
           run: hugo --minify  # 🎯 生成优化后的静态文件

         - name: Deploy
           uses: peaceiris/actions-gh-pages@v3
           with:
             github_token: ${{ secrets.GITHUB_TOKEN }}  # 🔑 自动注入无需修改
             publish_dir: ./public